<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nepal Translator - サイト翻訳ツール</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        color: #e0e0e0;
      }

      .header {
        text-align: center;
        padding: 40px 20px 20px;
      }

      .header h1 {
        font-size: 2.5rem;
        background: linear-gradient(90deg, #dc143c, #fff, #003893);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }

      .header p {
        color: #8892b0;
        font-size: 1.1rem;
      }

      .input-section {
        max-width: 700px;
        margin: 30px auto;
        padding: 0 20px;
      }

      .input-group {
        display: flex;
        gap: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 8px;
        backdrop-filter: blur(10px);
      }

      .input-group input {
        flex: 1;
        padding: 14px 20px;
        border: none;
        background: transparent;
        color: #fff;
        font-size: 1rem;
        outline: none;
      }

      .input-group input::placeholder {
        color: #6272a4;
      }

      .input-group button {
        padding: 14px 32px;
        background: linear-gradient(135deg, #dc143c, #e74c6f);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .input-group button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(220, 20, 60, 0.4);
      }

      .input-group button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .status {
        text-align: center;
        margin: 20px;
        min-height: 30px;
      }

      .status .loading {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #8892b0;
        font-size: 0.95rem;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #dc143c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .status .error {
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
        padding: 10px 20px;
        border-radius: 8px;
        display: inline-block;
      }

      .preview-container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 20px 40px;
        display: none;
      }

      .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .preview-header h2 {
        font-size: 1.2rem;
        color: #ccd6f6;
      }

      .preview-actions {
        display: flex;
        gap: 10px;
      }

      .preview-actions button {
        padding: 8px 18px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ccd6f6;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
      }

      .preview-actions button:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .preview-frame {
        width: 100%;
        height: 80vh;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }

      .preview-frame iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .info-cards {
        max-width: 700px;
        margin: 20px auto;
        padding: 0 20px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .info-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }

      .info-card .icon {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .info-card h3 {
        font-size: 0.95rem;
        color: #ccd6f6;
        margin-bottom: 6px;
      }

      .info-card p {
        font-size: 0.8rem;
        color: #6272a4;
        line-height: 1.4;
      }

      @media (max-width: 640px) {
        .header h1 { font-size: 1.8rem; }
        .input-group { flex-direction: column; }
        .input-group button { width: 100%; }
        .info-cards { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Nepal Translator</h1>
      <p>URLを入力するだけでサイトをネパール語に翻訳</p>
    </div>

    <div class="input-section">
      <div class="input-group">
        <input
          type="url"
          id="urlInput"
          placeholder="https://example.com を入力..."
          autocomplete="url"
        />
        <button id="translateBtn" onclick="translateSite()">翻訳する</button>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="preview-container" id="previewContainer">
      <div class="preview-header">
        <h2 id="previewTitle">翻訳結果</h2>
        <div class="preview-actions">
          <button onclick="openInNewTab()">新しいタブで開く</button>
          <button onclick="downloadHtml()">HTMLダウンロード</button>
        </div>
      </div>
      <div class="preview-frame">
        <iframe id="previewFrame" sandbox="allow-same-origin allow-scripts"></iframe>
      </div>
    </div>

    <div class="info-cards" id="infoCards">
      <div class="info-card">
        <div class="icon">&#127760;</div>
        <h3>そのままの見た目</h3>
        <p>画像・CSS・レイアウトをそのまま保持</p>
      </div>
      <div class="info-card">
        <div class="icon">&#128221;</div>
        <h3>テキスト全翻訳</h3>
        <p>タイトル・本文・alt属性まで翻訳</p>
      </div>
      <div class="info-card">
        <div class="icon">&#9889;</div>
        <h3>ワンクリック</h3>
        <p>URLを貼るだけの簡単操作</p>
      </div>
    </div>

    <script>
      let translatedHtmlBlob = null;

      const urlInput = document.getElementById("urlInput");
      urlInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") translateSite();
      });

      async function translateSite() {
        let siteUrl = urlInput.value.trim();
        if (!siteUrl) return;

        if (!siteUrl.startsWith("http://") && !siteUrl.startsWith("https://")) {
          siteUrl = "https://" + siteUrl;
          urlInput.value = siteUrl;
        }

        const btn = document.getElementById("translateBtn");
        const status = document.getElementById("status");
        const preview = document.getElementById("previewContainer");
        const infoCards = document.getElementById("infoCards");

        btn.disabled = true;
        btn.textContent = "翻訳中...";
        status.innerHTML =
          '<div class="loading"><div class="spinner"></div>サイトをブラウザで読み込み中（画像含む）... 少々お待ちください</div>';
        preview.style.display = "none";

        try {
          const res = await fetch("/api/translate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siteUrl }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Translation failed");
          }

          // Show result in iframe
          const blob = new Blob([data.html], { type: "text/html" });
          translatedHtmlBlob = blob;
          const blobUrl = URL.createObjectURL(blob);

          const iframe = document.getElementById("previewFrame");
          iframe.src = blobUrl;

          document.getElementById("previewTitle").textContent =
            `翻訳完了: ${siteUrl}`;
          preview.style.display = "block";
          infoCards.style.display = "none";
          status.innerHTML = "";

          // Scroll to preview
          preview.scrollIntoView({ behavior: "smooth" });
        } catch (err) {
          status.innerHTML = `<div class="error">${err.message}</div>`;
        } finally {
          btn.disabled = false;
          btn.textContent = "翻訳する";
        }
      }

      function openInNewTab() {
        if (!translatedHtmlBlob) return;
        const blobUrl = URL.createObjectURL(translatedHtmlBlob);
        window.open(blobUrl, "_blank");
      }

      function downloadHtml() {
        if (!translatedHtmlBlob) return;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(translatedHtmlBlob);
        a.download = "translated_nepali.html";
        a.click();
      }
    </script>
  </body>
</html>
